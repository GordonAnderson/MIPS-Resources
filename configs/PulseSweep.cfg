# This should be the first command in the config file.
size,680,380
# Load the background image. I have commented this like out because the path
# will likely be different on your system and you will need an image specific
# to you syste.
#image,/Users/GAA/GAACE/Products/MIPS/MIPSapp/MIPS/Example.jpg
# Help file for this custom control panel
# Text labels
TextLabel,Pulse sweep generator,20,270,10
# The following command enables the system shutdown button
#TCPserver,9999
# Save and load methods buttons
SaveLoad,Save method,Load method,20,50
# Enable MIPS communication button
MIPScomms,20,130
# Enable Script
Script,20,170

GroupBox,Pulse sweep,410,310,200,50
Ccontrol,Period,Pulse sequence,LineEdit,,period,,mS,10,30
Ccontrol,Cycles,Pulse sequence,LineEdit,,number of cycles,,,10,55
ScriptButton,Apply,Apply,230,30
ScriptButton,Abort,Abort,230,55

GroupBox,Sync pulse,190,190,10,90
